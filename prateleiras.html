<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#080808;--dark:#111;--dark2:#161616;--dark3:#1c1c1c;--accent:#2d7dd2;--accent2:#4a9eff;--white:#f4f4f4;--grey:#888;--border:rgba(255,255,255,0.08)}
html{scroll-behavior:smooth}
body{font-family:'Barlow',sans-serif;background:var(--black);color:var(--white);overflow-x:hidden}
img{display:block;max-width:100%}
a{text-decoration:none}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(8,8,8,0.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-logo img{height:32px;object-fit:contain}
.nav-wm{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--white)}
.nav-wm span{color:var(--accent2)}
.nav-wa{background:#25D366;color:#fff;padding:8px 16px;border-radius:2px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
.fwa{position:fixed;bottom:24px;right:24px;z-index:900;width:50px;height:50px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(37,211,102,.4);transition:transform .2s}
.fwa:hover{transform:scale(1.1)}
footer{background:var(--dark2);border-top:1px solid var(--border);padding:24px 32px;text-align:center}
footer p{font-size:11px;color:rgba(136,136,136,.6)}

.cat-hero{padding:96px 32px 40px;background:var(--dark2);border-bottom:1px solid var(--border)}
.cat-hero-inner{max-width:1200px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px}
.cat-num{font-family:'Bebas Neue',sans-serif;font-size:64px;color:rgba(45,125,210,.08);line-height:.8;letter-spacing:4px}
.cat-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,5vw,60px);letter-spacing:3px;margin-top:-12px}
.cat-name span{color:var(--accent2)}
.cat-meta{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--grey);margin-top:6px}
.back-link{display:inline-flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--grey);border:1px solid var(--border);padding:8px 16px;border-radius:2px;transition:all .2s}
.back-link:hover{color:var(--accent2);border-color:var(--accent2)}
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;width:100%}
.prod-card{background:var(--dark3);cursor:pointer;transition:opacity .2s}
.prod-card:hover{opacity:.9}
.prod-photo{aspect-ratio:1/1;overflow:hidden}
.prod-photo img{width:100%;height:100%;object-fit:cover;transition:transform .6s}
.prod-card:hover .prod-photo img{transform:scale(1.05)}
.prod-footer{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.prod-code{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;color:var(--accent2)}
.ver-btn{display:inline-flex;align-items:center;gap:5px;background:var(--accent);color:#fff;padding:7px 13px;border-radius:2px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap}
.ver-btn:hover{background:var(--accent2)}
@media(max-width:600px){
  nav{padding:0 14px}
  .cat-hero{padding:82px 16px 32px}
  .prod-grid{grid-template-columns:1fr 1fr;gap:3px}
  .prod-footer{padding:7px 9px}
  .prod-code{font-size:13px}
  .ver-btn{font-size:10px;padding:6px 9px}
}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">
    <img src="imgs/logo.jpg" alt="Vision Aço" onerror="this.style.display='none'">
    <span class="nav-wm">VISION <span>AÇO</span></span>
  </a>
  <a href="https://wa.me/5534988780922" target="_blank" class="nav-wa">WhatsApp</a>
</nav>
<div class="cat-hero">
  <div class="cat-hero-inner">
    <div>
      <div class="cat-num">06</div>
      <h1 class="cat-name">Pratelei<span>ras</span></h1>
      <p class="cat-meta" id="cat-count"></p>
    </div>
    <a href="index.html" class="back-link">&#8592; Voltar ao catálogo</a>
  </div>
</div>
<div class="prod-grid" id="grid"></div>

<script>
var imgs=["imgs/pr1.png", "imgs/pr2.png", "imgs/pr3.png", "imgs/pr4.jpg", "imgs/pr5.jpg", "imgs/pr6.jpg", "imgs/pr7.jpg", "imgs/pr8.jpg", "imgs/pr9.jpg", "imgs/pr10.jpg", "imgs/pr11.jpg"];
var PFX='PRA', ID='prateleiras';
function code(i){return PFX+'-'+String(i+1).padStart(2,'0');}
document.getElementById('cat-count').textContent=imgs.length+' modelos disponíveis';
var grid=document.getElementById('grid');
imgs.forEach(function(src,i){
  var card=document.createElement('div');
  card.className='prod-card';
  card.innerHTML='<div class="prod-photo"><img src="'+src+'" alt="'+code(i)+'" loading="lazy"></div><div class="prod-footer"><span class="prod-code">'+code(i)+'</span><span class="ver-btn">Quero esse &rarr;</span></div>';
  card.addEventListener('click',function(){window.location.href=ID+'-produto.html?p='+i;});
  grid.appendChild(card);
});
</script>
